<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR-код портфолио</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f0e6; color: #17201d; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    section { max-width: 720px; text-align: center; background: #fffdf8; border: 1px solid #d8cfbf; border-radius: 8px; padding: 36px; }
    h1 { margin: 0 0 12px; font-family: Georgia, serif; font-size: 42px; }
    p { color: #66716c; line-height: 1.55; }
    img { width: min(460px, 88vw); height: auto; }
    .url { margin-top: 18px; color: #0f5c55; font-weight: 700; word-break: break-all; }
    @media print { body { background: white; } section { border: 0; } }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>QR-код портфолио</h1>
      <p>Отсканируйте код, чтобы открыть электронное портфолио Айзенко Анастасии Васильевны.</p>
      <img src="assets/portfolio-qr-public.png" alt="QR-код для открытия портфолио">
      <p class="url">https://mar4enkowa-crypto.github.io/</p>
      <p>Публичная ссылка работает, пока на компьютере запущен сайт и открыт туннель.</p>
    </section>
  </main>
</body>
</html>
